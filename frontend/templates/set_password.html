<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Hospital - Create Password</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .password-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-field-wrapper input {
            padding-right: 60px !important;
        }
        .toggle-password-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-primary);
            font-size: 13px;
            font-weight: 600;
            user-select: none;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <!-- Brand Header -->
        <header class="brand-header">
            <svg class="hospital-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 10.5H13.5V5C13.5 4.17 12.83 3.5 12 3.5C11.17 3.5 10.5 4.17 10.5 5V10.5H5C4.17 10.5 3.5 11.17 3.5 12C3.5 12.83 4.17 13.5 5 13.5H10.5V19C10.5 19.83 11.17 20.5 12 20.5C12.83 20.5 13.5 19.83 13.5 19V13.5H19C19.83 13.5 20.5 12.83 20.5 12C20.5 11.17 19.83 10.5 19 10.5Z" fill="currentColor"/>
            </svg>
            <h1 class="brand-title">ABC Hospital</h1>
        </header>

        <!-- Main Card -->
        <main class="card">
            <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">Create Password</h2>
            <p class="form-subtitle">Choose a secure password to complete your profile registration for:<br><strong id="display-email" style="color: var(--color-dark);">email@example.com</strong></p>

            <!-- Toast Notification Container -->
            <div id="toast-message" class="toast hidden"></div>

            <!-- Password Form -->
            <form id="password-setup-form" class="form-content active" onsubmit="handlePasswordSubmit(event)">
                <div class="input-group">
                    <label for="new-password">Choose Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="new-password" required minlength="6" placeholder="Min 6 characters">
                        <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('new-password')">Show</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="confirm-password" required minlength="6" placeholder="Re-enter password">
                        <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('confirm-password')">Show</button>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Verify & Create Profile</button>
            </form>
        </main>
    </div>

    <script>
        // Parse email address from query string (?email=...)
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        if (!email) {
            window.location.href = '/';
        } else {
            document.getElementById('display-email').textContent = email;
        }

        // Show/hide toast helpers
        function showToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
        }

        function hideToast() {
            const toast = document.getElementById('toast-message');
            toast.className = 'toast hidden';
        }

        // Password Visibility Toggle
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const btn = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }

        // Form Submit Handler
        async function handlePasswordSubmit(event) {
            event.preventDefault();
            hideToast();

            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match.', 'error');
                return;
            }

            const submitBtn = event.target.querySelector('.submit-btn');
            submitBtn.textContent = 'Completing...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/set-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, 'success');
                    // Save authenticated user details directly for login session
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    
                    // Redirect directly to home page after 1.2 seconds
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 1200);
                } else {
                    showToast(result.message || 'Failed to complete registration.', 'error');
                }
            } catch (err) {
                console.error('Password Setup API Error:', err);
                showToast('Network error: Could not complete registration with the server.', 'error');
            } finally {
                submitBtn.textContent = 'Verify & Create Profile';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
