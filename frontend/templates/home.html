<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Hospital - Patient visit Registry</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="dashboard-container" style="max-width: 900px;">
        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="brand-header">
                <svg class="hospital-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M19 10.5H13.5V5C13.5 4.17 12.83 3.5 12 3.5C11.17 3.5 10.5 4.17 10.5 5V10.5H5C4.17 10.5 3.5 11.17 3.5 12C3.5 12.83 4.17 13.5 5 13.5H10.5V19C10.5 19.83 11.17 20.5 12 20.5C12.83 20.5 13.5 19.83 13.5 19V13.5H19C19.83 13.5 20.5 12.83 20.5 12C20.5 11.17 19.83 10.5 19 10.5Z"
                        fill="currentColor" />
                </svg>
                <h1 class="brand-title">ABC Hospital Registration Portal</h1>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </header>

        <!-- Main Card Welcome -->
        <main class="card" style="max-width: 100%;">
            <h2 id="welcome-title" style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">Welcome back!</h2>
            <p id="user-role-badge"
                style="display: inline-block; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--color-primary); letter-spacing: 0.5px; margin-bottom: 24px;">
                Role: Loading...</p>

            <!-- Toast Notification Container -->
            <div id="toast-message" class="toast hidden"></div>

            <div class="visit-registry-container">
                <!-- Manual Visit Entry Form -->
                <section class="visit-form-section">
                    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--color-dark);">Log
                        New Patient Visit</h3>
                    <form id="visit-form" onsubmit="handleVisitSubmit(event)"
                        style="display: flex; flex-direction: column; gap: 16px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="input-group">
                                <label for="visit-name">Patient Name</label>
                                <input type="text" id="visit-name" required placeholder="e.g. John Doe">
                            </div>
                            <div class="input-group">
                                <label for="visit-phone">Contact Number</label>
                                <input type="tel" id="visit-phone" required placeholder="e.g. +1234567890">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="input-group">
                                <label for="visit-age">Age</label>
                                <input type="number" id="visit-age" required min="1" max="120" placeholder="e.g. 28">
                            </div>
                            <div class="input-group">
                                <label for="visit-gender">Gender</label>
                                <select id="visit-gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <!-- Address & Department Fields -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="input-group">
                                <label for="visit-address">Home Address</label>
                                <input type="text" id="visit-address" required placeholder="e.g. 123 Main St">
                            </div>
                            <div class="input-group">
                                <label for="visit-department">Department</label>
                                <input type="text" id="visit-department" required placeholder="e.g. Cardiology">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="input-group">
                                <label for="visit-doctor">Attending Doctor</label>
                                <input type="text" id="visit-doctor" required placeholder="e.g. Dr. Alice Smith">
                            </div>
                            <div class="input-group">
                                <label for="visit-purpose">Purpose of Visit</label>
                                <input type="text" id="visit-purpose" required placeholder="e.g. General Consultation">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px;">
                            <button type="submit" class="submit-btn">Log Visitor Entry</button>
                            <button type="button" class="logout-btn" onclick="window.location.href = '/visits'"
                                style="padding: 14px; font-size: 14px; font-weight: 600; width: 100%;">View Patient
                                Visitor Log</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script>
        // Retrieve logged in user from localStorage
        const userJson = localStorage.getItem('currentUser');
        if (!userJson) {
            // Unauthenticated: Redirect to login
            window.location.href = '/';
        } else {
            const user = JSON.parse(userJson);

            // Set dynamic welcome text
            document.getElementById('welcome-title').textContent = `Welcome back, ${user.name}!`;
            document.getElementById('user-role-badge').textContent = `Authenticated Role: ${user.role}`;
        }

        // Toast notification helpers
        function showToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
        }

        // Helper to hide toast message
        function hideToast() {
            const toast = document.getElementById('toast-message');
            toast.className = 'toast hidden';
        }

        // Handle Visit Form Submission
        async function handleVisitSubmit(event) {
            event.preventDefault();
            hideToast();

            const submitBtn = event.target.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Logging visitor...';
            submitBtn.disabled = true;

            const payload = {
                patient_name: document.getElementById('visit-name').value,
                phone_number: document.getElementById('visit-phone').value,
                age: parseInt(document.getElementById('visit-age').value, 10),
                gender: document.getElementById('visit-gender').value,
                address: document.getElementById('visit-address').value,
                department: document.getElementById('visit-department').value,
                attending_doctor: document.getElementById('visit-doctor').value,
                purpose: document.getElementById('visit-purpose').value
            };

            try {
                const response = await fetch('/api/visits', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, 'success');
                    event.target.reset();
                    setTimeout(hideToast, 3000);
                } else {
                    showToast(result.message || 'Failed to log visit.', 'error');
                }
            } catch (err) {
                console.error('Error logging visit:', err);
                showToast('Network error: Could not reach server to log visit.', 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }

        // Logout function
        function handleLogout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/';
        }
    </script>
</body>

</html>
