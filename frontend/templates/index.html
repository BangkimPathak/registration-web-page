<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Hospital - Secure Portal</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="portal-container">
        <!-- Brand Header -->
        <header class="brand-header">
            <svg class="hospital-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 10.5H13.5V5C13.5 4.17 12.83 3.5 12 3.5C11.17 3.5 10.5 4.17 10.5 5V10.5H5C4.17 10.5 3.5 11.17 3.5 12C3.5 12.83 4.17 13.5 5 13.5H10.5V19C10.5 19.83 11.17 20.5 12 20.5C12.83 20.5 13.5 19.83 13.5 19V13.5H19C19.83 13.5 20.5 12.83 20.5 12C20.5 11.17 19.83 10.5 19 10.5Z" fill="currentColor"/>
            </svg>
            <h1 class="brand-title">ABC Hospital</h1>
        </header>

        <!-- Main Form Card -->
        <main class="card">
            <!-- Mode Toggle Tabs -->
            <div class="toggle-tabs">
                <button type="button" class="tab-btn active" id="tab-login" onclick="switchMode('login')">Sign In</button>
                <button type="button" class="tab-btn" id="tab-signup" onclick="switchMode('signup')">Register</button>
            </div>

            <!-- Toast Notification Container -->
            <div id="toast-message" class="toast hidden"></div>

            <!-- Login Form -->
            <form id="login-form" class="form-content active" onsubmit="handleFormSubmit(event, 'login')">
                <p class="form-subtitle">Enter your credentials to access your hospital account.</p>
                
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@hospital.com">
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>



                <button type="submit" class="submit-btn">Access Portal</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="form-content" onsubmit="handleFormSubmit(event, 'signup')">
                <p class="form-subtitle">Create a new secure patient or medical staff profile.</p>

                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="name@example.com">
                </div>

                <div class="input-group">
                    <label for="signup-gender">Gender</label>
                    <select id="signup-gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>



                <div class="input-group">
                    <label for="signup-age">Age</label>
                    <input type="number" id="signup-age" required min="1" max="120" placeholder="e.g. 28">
                </div>

                <div class="input-group">
                    <label for="signup-phone">Phone Number</label>
                    <input type="tel" id="signup-phone" required placeholder="e.g. +1234567890">
                </div>

                <div class="input-group">
                    <label for="signup-address">Home Address</label>
                    <textarea id="signup-address" required placeholder="e.g. 123 Main St, Apartment 4B" rows="3" style="resize: vertical;"></textarea>
                </div>



                <button type="submit" class="submit-btn">Send Verification Code</button>
            </form>
        </main>
    </div>

    <!-- Custom JavaScript Logic -->
    <script src="/static/js/main.js"></script>
</body>
</html>
