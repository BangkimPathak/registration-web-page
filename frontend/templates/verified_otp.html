<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Hospital - Verify Email</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #resend-btn:disabled {
            color: rgba(15, 23, 42, 0.4) !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <!-- Brand Header -->
        <header class="brand-header">
            <svg class="hospital-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 10.5H13.5V5C13.5 4.17 12.83 3.5 12 3.5C11.17 3.5 10.5 4.17 10.5 5V10.5H5C4.17 10.5 3.5 11.17 3.5 12C3.5 12.83 4.17 13.5 5 13.5H10.5V19C10.5 19.83 11.17 20.5 12 20.5C12.83 20.5 13.5 19.83 13.5 19V13.5H19C19.83 13.5 20.5 12.83 20.5 12C20.5 11.17 19.83 10.5 19 10.5Z" fill="currentColor"/>
            </svg>
            <h1 class="brand-title">ABC Hospital</h1>
        </header>

        <!-- Main Card -->
        <main class="card">
            <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">Verify Your Identity</h2>
            <p class="form-subtitle">We have sent a 6-digit verification code (OTP) to your email address: <br><strong id="display-email" style="color: var(--color-dark);">email@example.com</strong></p>

            <!-- Toast Notification Container -->
            <div id="toast-message" class="toast hidden"></div>

            <!-- OTP Input Form -->
            <form id="otp-form" class="form-content active" onsubmit="handleOtpSubmit(event)">
                <div class="input-group">
                    <label for="otp-code" style="text-align: center; margin-bottom: 8px;">6-Digit Verification Code</label>
                    <input type="text" id="otp-code" required maxlength="6" pattern="\d{6}" placeholder="000000" 
                           style="letter-spacing: 0.5em; text-align: center; font-size: 24px; font-weight: 700; padding: 12px 0;">
                </div>

                <button type="submit" class="submit-btn">Verify & Create Profile</button>
            </form>

            <!-- Resend Button -->
            <div style="text-align: center; margin-top: 16px;">
                <button type="button" id="resend-btn" onclick="handleResendOtp()" 
                        style="background: none; border: none; font-size: 13px; font-weight: 600; color: var(--color-primary); cursor: pointer; transition: color 0.2s ease;">
                    Resend Code
                </button>
            </div>

            <!-- Back navigation link -->
            <div style="text-align: center; margin-top: 24px;">
                <a href="/" style="font-size: 13px; font-weight: 600; color: var(--color-primary); text-decoration: none;">Back to Registration / Sign In</a>
            </div>
        </main>
    </div>

    <script>
        // Parse email address from query string (?email=...)
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        if (!email) {
            // If no email, redirect back to home page
            window.location.href = '/';
        } else {
            document.getElementById('display-email').textContent = email;
        }

        // Show/hide toast helpers
        function showToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
        }

        function hideToast() {
            const toast = document.getElementById('toast-message');
            toast.className = 'toast hidden';
        }

        // Resend Timer Logic
        let cooldownSeconds = 30;
        let cooldownTimer = null;
        const resendBtn = document.getElementById('resend-btn');

        function startCooldown() {
            resendBtn.disabled = true;
            cooldownSeconds = 30;
            updateResendBtnText();
            
            clearInterval(cooldownTimer);
            cooldownTimer = setInterval(() => {
                cooldownSeconds--;
                updateResendBtnText();
                if (cooldownSeconds <= 0) {
                    clearInterval(cooldownTimer);
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend Code';
                }
            }, 1000);
        }

        function updateResendBtnText() {
            resendBtn.textContent = `Resend Code (${cooldownSeconds}s)`;
        }

        // Initialize cooldown on page load
        startCooldown();

        // Resend Submit Handler
        async function handleResendOtp() {
            hideToast();
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/resend-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, 'success');
                    startCooldown(); // Restart 30-sec cooldown
                } else {
                    showToast(result.message || 'Failed to resend code.', 'error');
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend Code';
                }
            } catch (err) {
                console.error('Resend API Error:', err);
                showToast('Network error: Could not resend verification code.', 'error');
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend Code';
            }
        }

        // Form OTP Submit Handler
        async function handleOtpSubmit(event) {
            event.preventDefault();
            hideToast();

            const otpCode = document.getElementById('otp-code').value;
            const submitBtn = event.target.querySelector('.submit-btn');
            
            submitBtn.textContent = 'Verifying...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, otp: otpCode })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, 'success');
                    // Redirect to the password setup page provided by the backend response
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1200);
                } else {
                    showToast(result.message || 'Verification failed.', 'error');
                }
            } catch (err) {
                console.error('OTP API Error:', err);
                showToast('Network error: Could not verify identity with the server.', 'error');
            } finally {
                submitBtn.textContent = 'Verify & Create Profile';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
